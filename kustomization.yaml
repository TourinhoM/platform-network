apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Entry point pro Argo CD Application apontar.
#
# Este repo so contem PKI cluster-wide:
#   issuers/   — ClusterIssuers (selfsigned-bootstrap, ca-issuer)
#               + Certificate `lab-ca` que gera o CA cert do cluster
#
# Workload Certificates (keycloak-tls, monitoring-tls, etc.) vivem
# no repo do workload que os consome (deploy-keycloak,
# deploy-stack-monitor, etc.) — referenciam `ca-issuer` (ClusterIssuer
# cluster-scoped) por nome.

resources:
  - issuers
